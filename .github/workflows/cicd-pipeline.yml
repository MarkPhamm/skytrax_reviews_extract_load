name: Skytrax Reviews Pipeline CI/CD

on:
  schedule:
    - cron: '0 5 * * 1'   # Monday 5 AM UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint & Test

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (flake8 — errors only)
        run: uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check (black)
        run: uv run black --check .

      - name: Import sort check (isort)
        run: uv run isort --check-only .

      - name: Run tests
        run: uv run pytest tests/ -v

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan

    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  build-and-validate:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Astronomer image
        run: docker build -t skytrax-pipeline:${{ github.sha }} .

      - name: Validate DAG in container
        run: |
          docker run --rm skytrax-pipeline:${{ github.sha }} \
            python -c "
          import sys
          sys.path.append('/usr/local/airflow/dags')
          from main_dag import dag
          print(f'DAG: {dag.dag_id}')
          print(f'Tasks: {[t.task_id for t in dag.tasks]}')
          "

  run-pipeline:
    runs-on: ubuntu-latest
    name: Execute Pipeline
    needs: [test, security-scan, build-and-validate]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Scrape
        run: uv run python include/tasks/extract/scraper.py --pages 100

      - name: Transform
        run: uv run python include/tasks/transform/transform.py

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
        run: uv run python include/tasks/load/s3_upload.py

      - name: Load to Snowflake
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: uv run python include/tasks/load/snowflake_load.py

      - name: Upload landing artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: landing-${{ github.run_number }}
          path: landing/**/*.csv
          retention-days: 30
